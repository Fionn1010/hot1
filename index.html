<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Hill of Tara · Royal Heritage Experience</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
:root{--cream:#fbf6ea;--paper:#fffdf7;--gold:#c7962a;--gold2:#ddb04a;--line:#e7dcc7;--text:#171717;--muted:#655d52;--ok:#2d6b3d;--bad:#9f2f24}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--cream);font-family:Inter,system-ui,sans-serif;color:var(--text);padding-bottom:88px}button{font:inherit}.hero{min-height:220px;background:linear-gradient(rgba(0,0,0,.15),rgba(0,0,0,.75)),url("./images/hero.jpg") center/cover no-repeat,radial-gradient(circle at 50% 20%,#343028,#080808);color:white;display:grid;place-items:center;text-align:center;padding:30px}.hero h1{font-family:Cinzel,serif;font-size:clamp(44px,11vw,80px);margin:0;text-transform:uppercase;letter-spacing:.08em;line-height:.95}.hero p{margin:12px 0 0;color:#f0cb77;font-family:Cinzel,serif;letter-spacing:.15em}.panel{background:var(--paper);border-radius:0 0 28px 28px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.1)}.video{width:100%;background:#111}.video video{width:100%;display:block;aspect-ratio:16/9;object-fit:cover;background:#111}.missing{min-height:250px;display:grid;place-items:center;text-align:center;padding:24px;background:linear-gradient(135deg,#efe0c6,#d7c099);color:#6d5831;font-weight:900}.content{padding:22px;text-align:center}.stopnum{color:var(--gold);font-weight:900;letter-spacing:.18em;font-size:14px}.title{font-family:Cinzel,serif;font-size:clamp(36px,8vw,58px);margin:8px 0 6px;text-transform:uppercase;line-height:1}.subtitle{color:var(--muted);font-size:22px;margin:0}.begin{margin-top:18px;width:100%;min-height:86px;border:0;border-radius:22px;background:linear-gradient(180deg,#8d1e24,#6d151a);color:white;font-size:clamp(28px,6vw,40px);font-weight:900;cursor:pointer}.reveal{display:none;margin:0 18px 18px;padding:16px;border:1px solid #e5ca8b;background:#fff3d4;border-radius:18px;text-align:center;font-weight:900}.reveal.show{display:block}.ar{margin:26px 18px;padding:28px;border-radius:28px;border:2px solid var(--gold);background:linear-gradient(180deg,#fffdf7,#fff7e6);box-shadow:0 14px 40px rgba(199,150,42,.18);text-align:center}.aricon{font-size:56px;color:var(--gold)}.artitle{font-family:Cinzel,serif;font-size:42px;margin:8px 0}.ar p{color:var(--muted);font-size:24px;margin:0 0 18px}model-viewer{width:100%;height:360px;display:block;border-radius:20px;background:radial-gradient(circle at 50% 30%,#efe4ca,#d2bd92)}.launch{width:100%;min-height:84px;border:0;border-radius:22px;background:linear-gradient(180deg,var(--gold2),#be8a1d);color:white;font-size:32px;font-weight:900;box-shadow:0 12px 28px rgba(199,150,42,.25);margin-top:18px;cursor:pointer}.next{margin:26px 18px;text-align:center}.next h3{font-family:Cinzel,serif;font-size:36px;margin:0 0 10px}.next p{color:var(--muted);font-size:22px;margin:0 0 14px}.next button{width:100%;min-height:72px;border:1px solid var(--line);border-radius:20px;background:white;font-size:28px;font-weight:900;cursor:pointer}.dev{margin:26px 18px;padding:18px;border:1px solid var(--line);border-radius:18px;background:#f1ebdf}.dev summary{font-size:22px;font-weight:900;cursor:pointer}.dev-grid{display:grid;gap:12px;margin-top:16px}.dev-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;background:#fffaf0;border:1px solid var(--line);border-radius:14px;padding:12px}.dev-row small{color:var(--muted)}.small-btn{border:0;border-radius:12px;padding:12px 14px;background:#201b14;color:white;font-weight:900}.stop-all{min-height:54px;border-radius:14px;background:#fff2ec;color:#882b21;border:1px solid #eac7bc;font-weight:900}.diag{display:grid;gap:7px;font-size:14px}.diag-row{display:flex;justify-content:space-between;gap:12px;border:1px solid var(--line);border-radius:12px;background:#fffaf0;padding:8px 10px}.ok{color:var(--ok);font-weight:900}.bad{color:var(--bad);font-weight:900}.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:20;display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--line);background:rgba(255,250,240,.96);backdrop-filter:blur(14px);padding-bottom:env(safe-area-inset-bottom)}.bottom-nav button{min-height:66px;border:0;border-right:1px solid var(--line);background:#fffaf0;font-weight:900;font-size:20px;cursor:pointer}.bottom-nav button:last-child{border-right:0;background:linear-gradient(180deg,var(--gold2),#b78316);color:white}
</style>
</head>
<body>
<header class="hero"><div><div style="font-size:34px;color:#ddb04a">♛</div><h1>Hill of Tara</h1><p>SEAT OF THE HIGH KINGS</p></div></header>
<section class="panel"><div class="video" id="videoBox"></div><div class="content"><div class="stopnum" id="stopNum">STOP 1</div><div class="title" id="stopTitle">THE ENTRANCE</div><p class="subtitle" id="stopSubtitle">Begin your journey</p><button class="begin" id="beginBtn">♛ BEGIN THIS STOP</button></div><div class="reveal" id="reveal">✨ Story finished. View the AR scene next.</div></section>
<section class="ar" id="arPanel"><div class="aricon">◇</div><div class="artitle">VIEW IN AR</div><p>Place ancient Tara into the landscape</p><div id="modelBox"></div><button class="launch" id="launchArBtn">LAUNCH AR</button></section>
<section class="next"><h3>NEXT STOP</h3><p id="nextText">The Banqueting Hall</p><button id="nextBtn">Continue →</button></section>
<section class="dev"><details><summary>Developer Tools</summary><p style="color:var(--muted)">Testing controls and asset checks.</p><div class="dev-grid"><div class="dev-row"><div><strong>Background sound</strong><br><small id="ambienceFile"></small></div><button class="small-btn" id="ambienceBtn">Play</button></div><label>Ambience volume <input id="ambienceVol" type="range" min="0" max="100" value="35" style="width:100%"></label><div class="dev-row"><div><strong>Narration</strong><br><small id="voiceFile"></small></div><button class="small-btn" id="voiceBtn">Play</button></div><label>Voice volume <input id="voiceVol" type="range" min="0" max="100" value="100" style="width:100%"></label><button class="stop-all" id="stopAllBtn">■ Stop All Media</button><div class="diag" id="assetStatus"></div></div></details></section>
<nav class="bottom-nav"><button id="prevBtn">← Previous</button><button id="nextBtnBottom">Next →</button></nav>
<script>
const STOPS=[
{id:1,title:"THE ENTRANCE",subtitle:"Begin your journey",video:"videos/01_entrance.mp4",model:"models/1entrance.glb",usdz:"models/1entrance.usdz",ambience:"sounds/01_entrance.mp3",voice:"sounds/01_entrance_voice.mp3",next:"THE BANQUETING HALL"},
{id:2,title:"THE BANQUETING HALL",subtitle:"Ceremonial earthwork",video:"videos/02_banquet.mp4",model:"models/2banquethall.glb",usdz:"models/2banquethall.usdz",ambience:"sounds/02_banquet.mp3",voice:"sounds/02_banquet_voice.mp3",next:"THE PALISADE"},
{id:3,title:"THE PALISADE",subtitle:"Great timber enclosure",video:"videos/03_pallisade.mp4",model:"models/3pallisade.glb",usdz:"models/3pallisade.usdz",ambience:"sounds/03_pallisade.mp3",voice:"sounds/03_pallisade_voice.mp3",next:"RATH OF THE SYNODS"},
{id:4,title:"RATH OF THE SYNODS",subtitle:"Heart of royal Tara",video:"videos/04_rath.mp4",model:"models/4rath.glb",usdz:"models/4rath.usdz",ambience:"sounds/04_rath.mp3",voice:"sounds/04_rath_voice.mp3",next:"MOUND OF THE HOSTAGES"},
{id:5,title:"MOUND OF THE HOSTAGES",subtitle:"Sacred memory",video:"videos/05_mound.mp4",model:"models/5mound.glb",usdz:"models/5mound.usdz",ambience:"sounds/05_mound.mp3",voice:"sounds/05_mound_voice.mp3",next:"LIA FÁIL"},
{id:6,title:"LIA FÁIL",subtitle:"Stone of Destiny",video:"videos/06_stone.mp4",model:"models/6stone.glb",usdz:"models/6stone.usdz",ambience:"sounds/06_stone.mp3",voice:"sounds/06_stone_voice.mp3",next:"TEACH CORMAIC"},
{id:7,title:"TEACH CORMAIC",subtitle:"Royal gathering",video:"videos/07_cormaic.mp4",model:"models/7cormaic.glb",usdz:"models/7cormaic.usdz",ambience:"sounds/07_cormaic.mp3",voice:"sounds/07_cormaic_voice.mp3",next:"ST PATRICK & CHURCH"},
{id:8,title:"ST PATRICK & CHURCH",subtitle:"Later Christian memory",video:"videos/08_patrick.mp4",model:"models/8patrick.glb",usdz:"models/8patrick.usdz",ambience:"sounds/08_patrick.mp3",voice:"sounds/08_patrick_voice.mp3",next:"TOUR COMPLETE"}
];
const EXISTING=new Set(["models/2banquethall.glb","models/3pallisade.glb","models/4rath.glb","models/4rath.usdz","models/5mound.glb","models/6stone.glb","models/7cormaic.glb","videos/01_entrance.mp4","videos/02_banquet.mp4","videos/04_rath.mp4","videos/05_mound.mp4","videos/06_stone.mp4","videos/07_cormaic.mp4","sounds/02_banquet.mp3","sounds/02_banquet_voice.mp3","sounds/04_rath.mp3","sounds/06_stone.mp3","sounds/06_stone_voice.mp3","sounds/07_cormaic.mp3"]);
let current=Math.max(0,Math.min(STOPS.length-1,Number(new URLSearchParams(location.search).get("stop")||1)-1));let ambienceAudio=new Audio(),voiceAudio=new Audio();
function exists(p){return EXISTING.has(p)}
function statusRow(l,p){const ok=exists(p);return `<div class="diag-row"><span>${l}: <code>${p}</code></span><span class="${ok?'ok':'bad'}">${ok?'found':'missing'}</span></div>`}
function stopAll(){const v=document.getElementById("stopVideo");if(v)v.pause();ambienceAudio.pause();voiceAudio.pause()}
function loadAudio(){const s=STOPS[current];stopAll();ambienceAudio=new Audio(s.ambience);voiceAudio=new Audio(s.voice);ambienceAudio.volume=Number(document.getElementById("ambienceVol").value)/100;voiceAudio.volume=Number(document.getElementById("voiceVol").value)/100}
function render(){const s=STOPS[current];loadAudio();document.getElementById("stopNum").textContent=`STOP ${s.id}`;document.getElementById("stopTitle").textContent=s.title;document.getElementById("stopSubtitle").textContent=s.subtitle;document.getElementById("nextText").textContent=current===STOPS.length-1?"Tour complete":s.next;document.getElementById("ambienceFile").textContent=s.ambience;document.getElementById("voiceFile").textContent=s.voice;document.getElementById("reveal").classList.remove("show");document.getElementById("videoBox").innerHTML=exists(s.video)?`<video id="stopVideo" src="${s.video}" controls playsinline preload="metadata"></video>`:`<div class="missing">Missing video<br><code>${s.video}</code></div>`;document.getElementById("modelBox").innerHTML=exists(s.model)?`<model-viewer id="viewer" src="${s.model}" ${exists(s.usdz)?`ios-src="${s.usdz}"`:""} camera-controls touch-action="pan-y" auto-rotate ar ar-modes="scene-viewer quick-look webxr" shadow-intensity="1" exposure="1" alt="AR model for ${s.title}"></model-viewer>`:`<div class="missing">Missing AR model<br><code>${s.model}</code></div>`;document.getElementById("assetStatus").innerHTML=statusRow("Video",s.video)+statusRow("GLB model",s.model)+statusRow("iPhone USDZ",s.usdz)+statusRow("Background sound",s.ambience)+statusRow("Narration",s.voice);document.getElementById("prevBtn").disabled=current===0;document.getElementById("nextBtn").textContent=current===STOPS.length-1?"Finish":"Continue →";document.getElementById("nextBtnBottom").textContent=current===STOPS.length-1?"Finish":"Next →";attachVideoEvents();history.replaceState(null,"",`?stop=${s.id}`)}
function attachVideoEvents(){const v=document.getElementById("stopVideo");if(!v)return;v.addEventListener("play",()=>{const s=STOPS[current];if(exists(s.ambience)){ambienceAudio.currentTime=v.currentTime;ambienceAudio.play().catch(()=>{})}if(exists(s.voice)){voiceAudio.currentTime=v.currentTime;voiceAudio.play().catch(()=>{})}});v.addEventListener("pause",()=>{ambienceAudio.pause();voiceAudio.pause()});v.addEventListener("seeking",()=>{const s=STOPS[current];if(exists(s.ambience))ambienceAudio.currentTime=v.currentTime;if(exists(s.voice))voiceAudio.currentTime=v.currentTime});v.addEventListener("ended",()=>{ambienceAudio.pause();voiceAudio.pause();document.getElementById("reveal").classList.add("show");document.getElementById("arPanel").scrollIntoView({behavior:"smooth",block:"start"})})}
async function beginStop(){const s=STOPS[current],v=document.getElementById("stopVideo");if(v){v.currentTime=0;document.getElementById("videoBox").scrollIntoView({behavior:"smooth",block:"center"})}if(exists(s.ambience)){ambienceAudio.currentTime=0;ambienceAudio.play().catch(()=>{})}if(exists(s.voice)){voiceAudio.currentTime=0;voiceAudio.play().catch(()=>{})}if(v)setTimeout(()=>v.play().catch(()=>{}),250);if(!v&&!exists(s.ambience)&&!exists(s.voice))alert("No video or audio found for this stop yet.")}
async function launchAR(){const s=STOPS[current];if(!exists(s.model)){alert("Missing AR model: "+s.model);return}const viewer=document.getElementById("viewer");if(viewer&&viewer.activateAR){try{await viewer.activateAR()}catch(e){alert("Your phone blocked direct AR launch. Tap the AR icon inside the model viewer.")}}else alert("Use the AR icon inside the model viewer.")}
function nextStop(){if(current<STOPS.length-1){current++;render();window.scrollTo({top:0,behavior:"smooth"})}}function prevStop(){if(current>0){current--;render();window.scrollTo({top:0,behavior:"smooth"})}}
document.getElementById("beginBtn").onclick=beginStop;document.getElementById("launchArBtn").onclick=launchAR;document.getElementById("nextBtn").onclick=nextStop;document.getElementById("nextBtnBottom").onclick=nextStop;document.getElementById("prevBtn").onclick=prevStop;document.getElementById("stopAllBtn").onclick=stopAll;document.getElementById("ambienceBtn").onclick=()=>exists(STOPS[current].ambience)?(ambienceAudio.paused?ambienceAudio.play():ambienceAudio.pause()):alert("Missing file: "+STOPS[current].ambience);document.getElementById("voiceBtn").onclick=()=>exists(STOPS[current].voice)?(voiceAudio.paused?voiceAudio.play():voiceAudio.pause()):alert("Missing file: "+STOPS[current].voice);document.getElementById("ambienceVol").oninput=e=>ambienceAudio.volume=Number(e.target.value)/100;document.getElementById("voiceVol").oninput=e=>voiceAudio.volume=Number(e.target.value)/100;render();
</script>
</body>
</html>
